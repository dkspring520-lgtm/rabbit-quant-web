services:
  web:
    image: ${RABBIT_QUANT_WEB_IMAGE:-rabbit-quant-web-web}
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: rabbit-quant-modern-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    command:
      - sh
      - -lc
      - node scripts/sync-zijin-training-state.mjs public/research/zijin-training-progress.json /training-state/zijin-training-progress.json && node scripts/sync-zijin-automation-state.mjs public/research/zijin-automation-status.json /training-state/zijin-automation-status.json && exec npm start -- -p 3000 -H 0.0.0.0
    environment:
      CONTROL_PLANE_ORIGIN: http://control:3010
      ZIJIN_TRAINING_STATE_PATH: /training-state/zijin-training-progress.json
      ZIJIN_AUTOMATION_STATE_PATH: /training-state/zijin-automation-status.json
      ZIJIN_TRAINING_REPORT_PATH: /training-state/zijin-round11-report.json
      ZIJIN_TRAINER_ALERTS_PATH: /training-state/zijin-trainer-alerts.jsonl
      ZIJIN_SHADOW_STATE_PATH: /training-state/zijin-shadow-ab.json
    volumes:
      - /opt/rabbit-quant-state:/training-state
    depends_on:
      control:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/api/control/version').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 60s
  trainer:
    image: ${RABBIT_QUANT_TRAINER_IMAGE:-rabbit-quant-web-trainer}
    build:
      context: .
      dockerfile: Dockerfile.trainer
    container_name: rabbit-quant-zijin-trainer
    restart: unless-stopped
    environment:
      ZIJIN_TRAINING_INPUT: /training-data/zijin-peer-panel-2022-2026.parquet
      ZIJIN_AUTOMATION_STATE_PATH: /training-state/zijin-automation-status.json
      ZIJIN_TRAINING_REPORT_PATH: /training-state/zijin-round11-report.json
      ZIJIN_TRAINING_PROTOCOL: /app/scripts/zijin-round11-protocol.json
      ZIJIN_TRAINING_RUNNER: /app/scripts/run_zijin_round4_experiments.py
      ZIJIN_TRAINING_RUNTIME: /training-runtime
      ZIJIN_TRAINER_ALERTS_PATH: /training-state/zijin-trainer-alerts.jsonl
      ZIJIN_CHECK_INTERVAL_MINUTES: "30"
      ZIJIN_HEARTBEAT_SECONDS: "5"
      ZIJIN_IDLE_HEARTBEAT_SECONDS: "30"
      ZIJIN_SUPERVISOR_INTERVAL_SECONDS: "10"
      ZIJIN_STARTUP_GRACE_SECONDS: "90"
      ZIJIN_IDLE_GRACE_SECONDS: "180"
    volumes:
      - /opt/rabbit-quant-research:/training-data:ro
      - /opt/rabbit-quant-state:/training-state
      - /opt/rabbit-quant-training-runtime:/training-runtime
    healthcheck:
      test: ["CMD", "python", "scripts/zijin-trainer-healthcheck.py", "--state", "/training-state/zijin-automation-status.json", "--grace-seconds", "180"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 120s
    stop_grace_period: 20s
  shadow:
    image: ${RABBIT_QUANT_WEB_IMAGE:-rabbit-quant-web-web}
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: rabbit-quant-zijin-shadow
    command: ["node", "scripts/zijin-shadow-ab-observer.mjs"]
    restart: unless-stopped
    environment:
      ZIJIN_SHADOW_MARKET_ORIGIN: http://web:3000
      ZIJIN_SHADOW_STATE_PATH: /training-state/zijin-shadow-ab.json
      ZIJIN_SHADOW_LEDGER_PATH: /training-runtime/shadow/zijin-shadow-ab-events.jsonl
      ZIJIN_SHADOW_POLL_MS: "15000"
      ZIJIN_SHADOW_IDLE_POLL_MS: "60000"
      ZIJIN_SHADOW_PEERS: "600489,600547,603993,601168,600362,000630"
    volumes:
      - /opt/rabbit-quant-state:/training-state
      - /opt/rabbit-quant-training-runtime:/training-runtime
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "const fs=require('fs');const p='/training-state/zijin-shadow-ab.json';const s=JSON.parse(fs.readFileSync(p,'utf8'));if(Date.now()-Date.parse(s.updatedAt)>300000)process.exit(1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
  control:
    image: ${RABBIT_QUANT_WEB_IMAGE:-rabbit-quant-web-web}
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: rabbit-quant-control
    command: ["node", "server/control-plane.mjs"]
    restart: unless-stopped
    environment:
      NODE_ENV: production
      CONTROL_PORT: "3010"
      CONTROL_DB_PATH: /data/rabbit-control.sqlite
      MARKET_DATA_ORIGIN: http://web:3000
      MONITOR_INTERVAL_MS: "15000"
      RABBIT_ADMIN_USER: ${RABBIT_ADMIN_USER:-dkspring520@outlook.com}
    volumes:
      - rabbit-quant-data:/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3010/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  rabbit-quant-data:
