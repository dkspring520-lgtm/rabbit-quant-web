services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: rabbit-quant-modern-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 60s
